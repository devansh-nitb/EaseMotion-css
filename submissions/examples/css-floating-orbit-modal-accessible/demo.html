<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Modal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <button class="open-btn">
        Open Modal
    </button>

    <div class="modal-overlay">

        <div class="modal"
             role="dialog"
             aria-modal="true"
             aria-labelledby="modal-title">

            <div class="orbit orbit1"></div>
            <div class="orbit orbit2"></div>
            <div class="orbit orbit3"></div>

            <h2 id="modal-title">
                Floating Orbit Modal
            </h2>

            <p>
                A pure CSS accessible modal with floating orbit animation.
            </p>

            <button class="close-btn">
                Close
            </button>

        </div>

    </div>

</div>

</body>
</html>
